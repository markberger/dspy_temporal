# Auto-format and sort imports on every commit. Install the hook once with:
#   uv run pre-commit install
# Rule selection (import sorting only) is configured in pyproject.toml [tool.ruff].
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the `ruff` dev-dependency pin in pyproject.toml.
    rev: v0.15.17
    hooks:
      # Linter — here, import sorting (select = ["I"]) with autofix.
      - id: ruff-check
        args: [--fix]
      # Formatter (Black-compatible).
      - id: ruff-format
