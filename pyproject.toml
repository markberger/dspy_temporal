[project]
name = "dspy-temporal"
version = "0.1.0"
description = "Deploy DSPy programs on Temporal as durable workflows"
readme = "README.md"
requires-python = ">=3.10,<3.15"
dependencies = [
    "dspy>=3.3.0b1",
    "temporalio>=1.7",
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dspy_temporal"]

[tool.uv.sources]
dspy = { path = "../dspy", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
